<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OPUS.Z — Admin</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0a0a0a;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  /* Subtle background grid */
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(124,58,237,0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,58,237,0.06) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  /* Purple glow blob */
  body::after {
    content: '';
    position: absolute;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(124,58,237,0.15) 0%, transparent 70%);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }

  .login-card {
    position: relative;
    z-index: 10;
    background: #111;
    border: 1px solid rgba(124,58,237,0.3);
    border-radius: 20px;
    padding: 48px 44px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 0 60px rgba(124,58,237,0.12), 0 24px 60px rgba(0,0,0,0.5);
  }

  .brand {
    text-align: center;
    margin-bottom: 36px;
  }

  .brand-logo {
    font-size: 22px;
    font-weight: 900;
    letter-spacing: 0.12em;
    color: #fff;
    text-transform: uppercase;
  }

  .brand-logo span {
    color: #7c3aed;
  }

  .admin-badge {
    display: inline-block;
    margin-top: 8px;
    background: rgba(124,58,237,0.18);
    border: 1px solid rgba(124,58,237,0.4);
    color: #a78bfa;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.2em;
    padding: 3px 10px;
    border-radius: 50px;
    text-transform: uppercase;
  }

  .login-title {
    font-size: 20px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 6px;
    text-align: center;
  }

  .login-sub {
    font-size: 13px;
    color: #666;
    text-align: center;
    margin-bottom: 32px;
  }

  .field {
    margin-bottom: 16px;
  }

  label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 7px;
  }

  input[type="email"],
  input[type="password"],
  input[type="text"] {
    width: 100%;
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 10px;
    padding: 13px 16px;
    color: #fff;
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
  }

  input:focus {
    border-color: #7c3aed;
  }

  input::placeholder {
    color: #444;
  }

  .password-wrap {
    position: relative;
  }

  .password-wrap input {
    padding-right: 44px;
  }

  .toggle-pw {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    color: #555;
    padding: 4px;
    display: flex;
    align-items: center;
    transition: color 0.2s;
  }

  .toggle-pw:hover { color: #aaa; }

  .error-msg {
    background: rgba(220,38,38,0.12);
    border: 1px solid rgba(220,38,38,0.3);
    color: #f87171;
    font-size: 13px;
    border-radius: 8px;
    padding: 10px 14px;
    margin-bottom: 16px;
    display: none;
  }

  .error-msg.show { display: block; }

  .btn-login {
    width: 100%;
    background: #7c3aed;
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 14px;
    font-size: 15px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    margin-top: 8px;
    transition: background 0.2s, transform 0.1s;
    letter-spacing: 0.02em;
  }

  .btn-login:hover { background: #6d28d9; }
  .btn-login:active { transform: scale(0.98); }

  .btn-login.loading {
    opacity: 0.7;
    pointer-events: none;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 24px 0 20px;
  }

  .divider::before,
  .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: #222;
  }

  .divider span {
    font-size: 11px;
    color: #444;
    white-space: nowrap;
  }

  .security-note {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 14px;
    background: rgba(124,58,237,0.07);
    border: 1px solid rgba(124,58,237,0.15);
    border-radius: 8px;
    font-size: 12px;
    color: #8b7ab8;
  }

  .security-note svg { flex-shrink: 0; }

  .footer-note {
    text-align: center;
    font-size: 11px;
    color: #3a3a3a;
    margin-top: 28px;
  }

  /* Shake animation for wrong password */
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-6px); }
    80% { transform: translateX(6px); }
  }

  .shake { animation: shake 0.4s ease; }

  /* Success flash */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .success-screen {
    display: none;
    text-align: center;
    animation: fadeUp 0.4s ease;
  }

  .success-screen.show { display: block; }
  .login-form.hide { display: none; }

  .success-icon {
    width: 56px;
    height: 56px;
    background: rgba(124,58,237,0.2);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 16px;
  }

  .success-title {
    font-size: 20px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 8px;
  }

  .success-sub {
    font-size: 13px;
    color: #666;
    margin-bottom: 24px;
  }

  .progress-bar {
    height: 3px;
    background: #222;
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 12px;
  }

  .progress-fill {
    height: 100%;
    background: #7c3aed;
    border-radius: 2px;
    width: 0%;
    transition: width 1.5s linear;
  }

  .redirect-note {
    font-size: 12px;
    color: #555;
  }
</style>
</head>
<body>

<div class="login-card">
  <div class="brand">
    <div class="brand-logo">OPUS<span>.</span>Z</div>
    <div class="admin-badge">Admin Portal</div>
  </div>

  <!-- Login Form -->
  <div class="login-form" id="loginForm">
    <p class="login-title">Welcome back</p>
    <p class="login-sub">Sign in to manage your platform</p>

    <div class="error-msg" id="errorMsg">
      Incorrect email or password. Please try again.
    </div>

    <div class="field">
      <label>Email</label>
      <input type="email" id="emailInput" placeholder="tzutung.liao@gmail.com" autocomplete="username">
    </div>

    <div class="field">
      <label>Password</label>
      <div class="password-wrap">
        <input type="password" id="pwInput" placeholder="••••••••" autocomplete="current-password">
        <button class="toggle-pw" id="togglePw" type="button" aria-label="Show password">
          <svg id="eyeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>

    <button class="btn-login" id="loginBtn" onclick="doLogin()">Sign in</button>

    <div class="divider"><span>secure access</span></div>

    <div class="security-note">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
      </svg>
      This portal is for authorized OPUS.Z administrators only.
    </div>
  </div>

  <!-- Success Screen -->
  <div class="success-screen" id="successScreen">
    <div class="success-icon">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#a78bfa" stroke-width="2.5">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>
    <p class="success-title">Verified</p>
    <p class="success-sub">Redirecting to admin panel…</p>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <p class="redirect-note">Please wait</p>
  </div>

  <p class="footer-note">OPUS.Z Platform © 2025</p>
</div>

<script>
  // Admin credentials
  const ADMIN_EMAIL    = 'tzutung.liao@gmail.com';
  const ADMIN_PASSWORD = 'qwertyuiop357';

  // Toggle password visibility
  document.getElementById('togglePw').addEventListener('click', function() {
    const input = document.getElementById('pwInput');
    const icon  = document.getElementById('eyeIcon');
    if (input.type === 'password') {
      input.type = 'text';
      icon.innerHTML = `
        <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/>
        <path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/>
        <line x1="1" y1="1" x2="23" y2="23"/>
      `;
    } else {
      input.type = 'password';
      icon.innerHTML = `
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
        <circle cx="12" cy="12" r="3"/>
      `;
    }
  });

  // Enter key to submit
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doLogin();
  });

  function doLogin() {
    const email = document.getElementById('emailInput').value.trim();
    const pw    = document.getElementById('pwInput').value;
    const btn   = document.getElementById('loginBtn');
    const err   = document.getElementById('errorMsg');

    err.classList.remove('show');

    if (!email || !pw) {
      err.textContent = 'Please enter both email and password.';
      err.classList.add('show');
      return;
    }

    // Loading state
    btn.classList.add('loading');
    btn.textContent = 'Signing in…';

    setTimeout(function() {
      if (email === ADMIN_EMAIL && pw === ADMIN_PASSWORD) {
        // Save admin session
        localStorage.setItem('opusz_admin_loggedIn', 'true');
        localStorage.setItem('opusz_admin_email', email);
        showSuccess();
      } else {
        btn.classList.remove('loading');
        btn.textContent = 'Sign in';
        err.textContent = 'Incorrect email or password. Please try again.';
        err.classList.add('show');
        // Shake the card
        document.querySelector('.login-card').classList.remove('shake');
        void document.querySelector('.login-card').offsetWidth;
        document.querySelector('.login-card').classList.add('shake');
      }
    }, 900);
  }

  function showSuccess() {
    document.getElementById('loginForm').classList.add('hide');
    document.getElementById('successScreen').classList.add('show');

    // Animate progress bar
    setTimeout(function() {
      document.getElementById('progressFill').style.width = '100%';
    }, 50);

    // Redirect after 1.6s
    setTimeout(function() {
      window.location.href = 'admin-panel.html';
    }, 1700);
  }

  // Check if already logged in
  if (localStorage.getItem('opusz_admin_loggedIn') === 'true') {
    window.location.href = 'admin-panel.html';
  }
</script>
</body>
</html>
