<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Favourites — OPUS.Z</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --black:#0a0a0a;--white:#fff;--gray:#f5f5f5;--mid:#888;--radius:12px;
  --nav-fg:#fff;
}
body{font-family:'Inter',sans-serif;color:var(--black);background:#fff;-webkit-font-smoothing:antialiased;}

/* ── NAV ── */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 200;
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 40px;
  min-height: 76px;
  background: transparent;
  mix-blend-mode: difference;
}
nav.mega-open {
  mix-blend-mode: normal;
  background: #fff;
  transition: background 0.22s ease;
  --nav-fg: #000;
}
nav, nav.nav-on-dark { --nav-fg: #fff; }
nav.nav-on-light { --nav-fg: #000; }
.nav-logo { display: flex; align-items: center; gap: 10px; font-size: 17px; font-weight: 700; text-decoration: none; color: #fff; padding-left: 50px; }
.orb { width: 46px; height: 46px; background: url('assets/images/LOGO/opusz-logo-cropped.png?v=7') center/cover no-repeat; flex-shrink: 0; }
#navOrbFixed {
  position: fixed; top: 18px; left: 40px;
  z-index: 201;
  display: flex; align-items: center; gap: 10px;
  text-decoration: none;
  pointer-events: all;
  color: #000;
  font-size: 17px; font-weight: 700;
}
.nav-logo-spacer { width: 180px; flex-shrink: 0; }
.nav-logo-text { display: flex; flex-direction: column; overflow: hidden; line-height: 1; }
.nav-logo-name { display: block; }
.nav-logo-sub {
  display: block; font-size: 17px; font-weight: 700; letter-spacing: 0;
  max-height: 0; overflow: hidden; opacity: 0; transform: translateY(5px);
  transition: max-height 0.38s cubic-bezier(0.34,1.15,0.64,1), opacity 0.28s ease,
              transform 0.38s cubic-bezier(0.34,1.15,0.64,1), margin-top 0.38s cubic-bezier(0.34,1.15,0.64,1);
  margin-top: 0;
}
.nav-logo:hover .nav-logo-sub, #navOrbFixed:hover .nav-logo-sub {
  max-height: 28px; opacity: 1; transform: translateY(0); margin-top: 2px;
}
.nav-links { display: flex; gap: 10px; list-style: none; position: absolute; left: 0; right: 0; justify-content: center; pointer-events: none; }
.nav-links li { pointer-events: all; }
.nav-links a {
  text-decoration: none; font-size: 15px;
  position: relative; padding: 11px 22px; border-radius: 50px;
  display: inline-flex; align-items: center; justify-content: center;
  line-height: 1; vertical-align: middle; white-space: nowrap;
  z-index: 0; color: transparent;
}
nav.mega-open .nav-links { mix-blend-mode: normal; }
nav.mega-open .nav-links a { color: #000; }
nav.mega-open .nav-links .nc-char { color: #000 !important; }
.nc-char { display: inline-block; color: #fff; }
.nc-sp { display: inline-block; min-width: 0.3em; }
nav.mega-open .nc-char { color: #000 !important; transition: none; }
nav .nav-logo-name, nav .nav-logo-sub { color: transparent; }
#navOrbFixed .nav-logo-name, #navOrbFixed .nav-logo-sub { color: #000; }
nav.mega-open .nav-logo-name .nc-char, nav.mega-open .nav-logo-sub .nc-char { color: #000 !important; transition: none; }
@media (max-width: 1440px) { nav { padding: 13px 28px; } .nav-links { gap: 4px; } .nav-links a { font-size: 13px; padding: 9px 14px; } }
@media (max-width: 1200px) { nav { padding: 11px 24px; } .nav-links { gap: 2px; } .nav-links a { font-size: 12px; padding: 8px 11px; } }
.nav-links a::before { display: none; }
.nav-links a:hover { opacity: 1; }
.nav-ul {
  position: absolute; bottom: 3px; left: 10px; right: 10px; height: 1px;
  background: #fff; transform: scaleX(0); transform-origin: right center;
  transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  pointer-events: none;
}
.nav-links a:hover .nav-ul { transform: scaleX(1); transform-origin: left center; }
nav.mega-open .nav-links a:hover .nav-ul { background: #000; }
.hamburger { display: flex; flex-direction: column; gap: 6px; cursor: pointer; position: relative; z-index: 301; }
.hamburger span { display: block; width: 26px; height: 2px; background: var(--nav-fg); transition: opacity .2s; }
.hamburger:hover span { opacity: .5; }
.nav-right { display: flex; align-items: center; gap: 14px; }
.nav-fav-btn { position: relative; background: none; border: none; cursor: pointer; color: var(--nav-fg, #fff); display: flex; align-items: center; padding: 6px; }
.nav-fav-btn:hover { opacity: .65; }
.nav-fav-btn svg { display: block; }
.nav-fav-count { position:absolute; top:0; right:0; background:#e05; color:#fff; font-size:9px; font-weight:700; border-radius:50%; width:14px; height:14px; display:flex; align-items:center; justify-content:center; line-height:1; }
.nav-login-btn {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 13px; font-weight: 500; font-family: inherit;
  color: var(--nav-fg, #fff); background: none; border: 1px solid rgba(255,255,255,.35);
  border-radius: 50px; padding: 7px 14px; cursor: pointer; position: relative;
}
.nav-login-btn svg { width: 12px; height: 12px; transition: transform .2s; }
.nav-login-btn.open svg { transform: rotate(180deg); }
.nav-login-dropdown {
  display: none; position: absolute; top: calc(100% + 8px); right: 0;
  background: #fff; border: 1px solid rgba(0,0,0,.1); border-radius: 10px;
  padding: 6px 0; min-width: 160px; box-shadow: 0 8px 24px rgba(0,0,0,.1); z-index: 210;
}
.nav-login-btn.open .nav-login-dropdown { display: block; }
.nav-login-dropdown a { display: block; padding: 10px 16px; font-size: 13px; color: #111; }
.nav-login-dropdown a:hover { background: #f5f5f5; }
.nav-login-vsep { border-top: 1px solid rgba(0,0,0,.08); margin: 3px 0; }
.lang-toggle {
  display: flex; align-items: center; gap: 2px;
  font-size: 12px; font-weight: 600; letter-spacing: .04em;
  background: none; border: none; cursor: pointer; color: var(--nav-fg, #fff); font-family: inherit;
}
.lt-opt { opacity: .4; transition: opacity .15s; }
.lt-opt.active { opacity: 1; }
.lt-sep { opacity: .25; }
.nav-drawer {
  position: fixed; top: 0; right: -260px; bottom: 0; width: 260px;
  background: #fff; box-shadow: -12px 0 48px rgba(0,0,0,0.10);
  padding: 90px 40px 48px; display: flex; flex-direction: column; gap: 4px;
  transition: right 0.18s ease; z-index: 300; pointer-events: none;
}
.nav-drawer.nd-visible { right: 0; pointer-events: auto; transition: right 0.42s cubic-bezier(0.22,1,0.36,1); }
.nav-drawer a { display: block; padding: 12px 0; font-size: 17px; font-weight: 500; color: #000; text-decoration: none; border-bottom: 1px solid rgba(0,0,0,0.06); opacity: 0; transform: translateX(18px); transition: opacity .12s ease, transform .12s ease, color .15s ease; }
.nav-drawer a:last-child { border-bottom: none; }
.nav-drawer a:hover { color: rgba(0,0,0,0.4); }
.nav-drawer.nd-visible a { opacity: 1; transform: translateX(0); transition: opacity 0.38s cubic-bezier(0.22,1,0.36,1), transform 0.38s cubic-bezier(0.22,1,0.36,1), color .15s ease; }
.nav-drawer.nd-visible a:nth-child(1) { transition-delay: 0.07s; }
.nav-drawer.nd-visible a:nth-child(2) { transition-delay: 0.11s; }
.nav-drawer.nd-visible a:nth-child(3) { transition-delay: 0.15s; }
.nav-drawer.nd-visible a:nth-child(4) { transition-delay: 0.19s; }
.nav-drawer.nd-visible a:nth-child(5) { transition-delay: 0.23s; }
.nd-musicians-btn { display: flex; align-items: center; justify-content: space-between; width: 100%; padding: 12px 0; font-size: 17px; font-weight: 500; color: #000; background: none; border: none; border-bottom: 1px solid rgba(0,0,0,0.06); cursor: pointer; font-family: inherit; text-align: left; opacity: 0; transform: translateX(18px); transition: opacity .12s ease, transform .12s ease, color .15s ease; }
.nd-musicians-btn:hover { color: rgba(0,0,0,0.4); }
.nd-musicians-btn .nd-arrow { font-size: 18px; opacity: .35; transition: opacity .15s; }
.nd-musicians-btn:hover .nd-arrow { opacity: .7; }
.nav-drawer.nd-visible .nd-musicians-btn { opacity: 1; transform: translateX(0); transition: opacity 0.38s cubic-bezier(0.22,1,0.36,1), transform 0.38s cubic-bezier(0.22,1,0.36,1), color .15s ease; transition-delay: 0.15s; }
.nav-sub-drawer { position: fixed; top: 0; right: -300px; bottom: 0; width: 300px; background: #fff; box-shadow: -12px 0 48px rgba(0,0,0,0.12); display: flex; flex-direction: column; transition: right 0.18s ease; z-index: 302; pointer-events: none; overflow: hidden; }
.nav-sub-drawer.ns-visible { right: 0; pointer-events: auto; transition: right 0.38s cubic-bezier(0.22,1,0.36,1); }
.nsd-head { display: flex; align-items: center; gap: 12px; padding: 22px 24px 16px; border-bottom: 1px solid rgba(0,0,0,0.07); flex-shrink: 0; }
.nsd-back { background: none; border: none; cursor: pointer; font-size: 20px; color: #000; padding: 4px; display: flex; align-items: center; opacity: .5; transition: opacity .15s; }
.nsd-back:hover { opacity: 1; }
.nsd-title { font-size: 16px; font-weight: 700; }
.nsd-body { overflow-y: auto; flex: 1; padding: 12px 0 40px; -webkit-overflow-scrolling: touch; }
.nsd-group { margin-bottom: 4px; }
.nsd-group-title { font-size: 10px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: rgba(0,0,0,0.35); padding: 14px 24px 6px; }
.nsd-group a, .nsd-link { display: block; padding: 10px 24px; font-size: 15px; font-weight: 500; color: #000; text-decoration: none; transition: background .12s, color .12s; }
.nsd-group a:hover, .nsd-link:hover { background: #f5f5f5; }
.mega-menu {
  position: absolute; top: 100%; left: 0; right: 0; background: #fff;
  box-shadow: 0 24px 64px rgba(0,0,0,0.09), 0 4px 16px rgba(0,0,0,0.05);
  padding: 36px 40px 40px; display: grid; grid-template-columns: repeat(8,1fr); gap: 0;
  opacity: 0; transform: translateY(-22px); pointer-events: none;
  transition: opacity 0.22s ease, transform 0.22s ease;
}
.mega-menu.mm-visible { opacity: 1; transform: translateY(0); pointer-events: auto; }
.mega-col { padding: 0 16px; border-left: none; opacity: 0; transform: translateY(8px); transition: opacity 0.28s ease, transform 0.28s ease; }
.mega-col:first-child { border-left: none; padding-left: 0; }
.mega-col:last-child { border-right: none; margin-right: 0; padding-right: 0; }
.mega-menu.mm-visible .mega-col { opacity: 1; transform: translateY(0); }
.mega-menu.mm-visible .mega-col:nth-child(1) { transition-delay: 0.05s; }
.mega-menu.mm-visible .mega-col:nth-child(2) { transition-delay: 0.08s; }
.mega-menu.mm-visible .mega-col:nth-child(3) { transition-delay: 0.11s; }
.mega-menu.mm-visible .mega-col:nth-child(4) { transition-delay: 0.14s; }
.mega-menu.mm-visible .mega-col:nth-child(5) { transition-delay: 0.17s; }
.mega-menu.mm-visible .mega-col:nth-child(6) { transition-delay: 0.20s; }
.mega-col-title { display: block; font-size: 11px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: #111; margin-bottom: 10px; text-decoration: none; }
.mega-col ul { list-style: none; padding: 0; }
.mega-col ul li a { display: block; padding: 5px 0; font-size: 13px; color: #555; text-decoration: none; transition: color .12s; }
.mega-col ul li a:hover { color: #000; }
.login-modal-overlay { position: fixed; inset: 0; z-index: 2000; background: rgba(0,0,0,.35); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity .2s; }
.login-modal-overlay.open { opacity: 1; pointer-events: auto; }
.login-modal { background: #fff; border-radius: 18px; padding: 40px 36px 32px; width: 360px; max-width: 92vw; box-shadow: 0 24px 80px rgba(0,0,0,.22); transform: translateY(12px); transition: transform .2s; position: relative; }
.login-modal-overlay.open .login-modal { transform: translateY(0); }
.login-modal-close { position: absolute; top: 16px; right: 16px; width: 28px; height: 28px; border-radius: 50%; background: #f0f0f0; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; color: #555; transition: background .15s; }
.login-modal-close:hover { background: #e0e0e0; }
.login-modal-title { font-size: 22px; font-weight: 900; letter-spacing: -.03em; margin-bottom: 24px; }
.login-modal-input { width: 100%; padding: 12px 14px; border-radius: 10px; border: 1.5px solid #e0e0e0; font-size: 14px; font-family: inherit; outline: none; transition: border-color .15s; box-sizing: border-box; display: block; margin-bottom: 12px; }
.login-modal-input:focus { border-color: #111; }
.login-modal-btn { width: 100%; padding: 13px; border-radius: 10px; background: #111; color: #fff; border: none; font-size: 15px; font-weight: 700; font-family: inherit; cursor: pointer; margin-top: 4px; }
.login-modal-footer { text-align: center; margin-top: 16px; font-size: 13px; color: #888; }
.login-modal-footer a { color: #111; font-weight: 600; text-decoration: none; margin-left: 4px; }

/* ── HERO ── */
.hero{position:relative;min-height:320px;background:linear-gradient(135deg,#0a0a0a 0%,#1a1a2e 50%,#16213e 100%);overflow:hidden;display:flex;align-items:flex-end;}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.75) 0%,rgba(0,0,0,.2) 60%,transparent 100%);}
.hero-content{position:relative;z-index:2;padding:112px 48px 40px;width:100%;max-width:900px;}
.hero-breadcrumb{font-size:12px;color:rgba(255,255,255,.5);margin-bottom:14px;display:flex;align-items:center;gap:6px;}
.hero-breadcrumb a{color:rgba(255,255,255,.5);text-decoration:none;}
.hero-breadcrumb a:hover{color:#fff;}
.hero-title{font-size:clamp(28px,4vw,52px);font-weight:800;color:#fff;line-height:1.15;letter-spacing:-.02em;margin-bottom:10px;}
.hero-sub{font-size:15px;color:rgba(255,255,255,.65);max-width:500px;line-height:1.6;}

/* ── GRID SECTION ── */
.grid-section{padding:40px 48px 80px;}
.grid-section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;}
.grid-section-title{font-size:18px;font-weight:700;letter-spacing:-.02em;}
.grid-count{font-size:13px;color:var(--mid);}
.musician-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:28px;}
@media(max-width:900px){.musician-grid{grid-template-columns:repeat(2,1fr);}}
@media(max-width:560px){.musician-grid{grid-template-columns:1fr;}.grid-section{padding:24px 20px 60px;}.hero-content{padding:96px 20px 28px;}}

/* ── CARD ── */
.mcard{border-radius:var(--radius);overflow:hidden;background:#fff;border:1.5px solid #efefef;transition:box-shadow .25s,transform .25s;cursor:pointer;position:relative;}
.mcard:hover{box-shadow:0 14px 44px rgba(0,0,0,.13);transform:translateY(-3px);}
.mcard-photo{position:relative;aspect-ratio:4/3;overflow:hidden;background:#f0f0f0;}
.mcard-photo img{object-fit:contain;}
.mcard-photo-zoom{position:absolute;inset:0;transition:transform 0.55s cubic-bezier(0.25,0.46,0.45,0.94);transform-origin:center center;}
.mcard:hover .mcard-photo-zoom{transform:scale(1.06);}
.mcard-photo-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:48px;}
.mcard-heart{position:absolute;top:10px;right:10px;width:34px;height:34px;background:rgba(255,255,255,.9);backdrop-filter:blur(4px);border:none;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:5;transition:background .15s,transform .15s;}
.mcard-heart:hover{background:#fff;transform:scale(1.12);}
.mcard-heart svg{transition:fill .15s,stroke .15s;}
.mcard-heart.active svg{fill:#e05;stroke:#e05;}
.mcard-explore-photo{
  position:absolute;bottom:12px;right:14px;
  transform:translateY(6px) scale(0.85);transform-origin:bottom right;
  z-index:5;opacity:0;pointer-events:none;
  transition:opacity .24s ease, transform .38s cubic-bezier(0.34,1.35,0.64,1);
  background:rgba(255,255,255,0.96);backdrop-filter:blur(8px);
  color:#000;font-family:inherit;font-size:11.5px;font-weight:700;
  padding:7px 18px;border-radius:50px;
  white-space:nowrap;letter-spacing:.04em;
  box-shadow:0 2px 12px rgba(0,0,0,.12);
}
.mcard:hover .mcard-explore-photo{opacity:1;transform:translateY(0) scale(1);}
.mcard-photo-link{display:block;text-decoration:none;color:inherit;}
.mcard-body{padding:16px;}
.mcard-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.mcard-rating{display:flex;align-items:center;gap:4px;}
.mcard-stars{color:#f5a623;font-size:12px;letter-spacing:1px;}
.mcard-rating-val{font-size:12px;font-weight:600;color:#555;}
.mcard-reviews{font-size:11px;color:var(--mid);}
.mcard-location{font-size:12px;color:var(--mid);display:flex;align-items:center;gap:3px;margin-bottom:8px;}
.mcard-location svg{flex-shrink:0;}
.mcard-name{font-size:15px;font-weight:700;margin-bottom:3px;line-height:1.3;}
.mcard-instrument{font-size:11px;font-weight:600;color:var(--mid);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;}
.mcard-bio{font-size:12.5px;color:#555;line-height:1.55;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.mcard-enq-btn{display:block;width:100%;margin-top:12px;padding:9px 0;background:#0a0a0a;color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:700;font-family:inherit;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;transition:background .15s;}
.mcard-enq-btn:hover{background:#333;}

/* ── EMPTY STATE ── */
.empty-state{text-align:center;padding:80px 20px;color:var(--mid);}
.empty-state svg{opacity:.25;margin-bottom:20px;}
.empty-state h2{font-size:22px;font-weight:700;color:#333;margin-bottom:12px;}
.empty-state p{font-size:15px;color:var(--mid);line-height:1.6;}
.empty-state a{color:var(--black);font-weight:600;text-decoration:underline;text-underline-offset:3px;}
.empty-state a:hover{opacity:.65;}
html,body{scrollbar-width:none;-ms-overflow-style:none;}html::-webkit-scrollbar,body::-webkit-scrollbar{display:none;}
</style>

<script>
// ── I18N ──────────────────────────────────────────────────────────────────────
var _currentLang = window._currentLang || 'en';
var I18N = {
  en: {
    'nav.home':'Home','nav.discover':'Blog','nav.artists':'Musicians',
    'nav.news':'Shows','nav.contact':'Contact','nav.lessons':'Lessons',

function switchLang(lang) {
  _currentLang = lang;
  var dict = I18N[lang] || I18N.en;
  document.querySelectorAll('[data-i18n]').forEach(function(el) {
    var v = dict[el.getAttribute('data-i18n')];
    if (v !== undefined) el.textContent = v;
  });
  document.querySelectorAll('#langToggle .lt-opt').forEach(function(o) {
    o.classList.toggle('active', o.dataset.l === lang);
  });
  document.documentElement.lang = lang === 'zh' ? 'zh-TW' : 'en';
  if (typeof window.__navResplit === 'function') window.__navResplit();
  // Update page-specific text
  document.getElementById('heroTitle').textContent = lang === 'zh' ? '我的收藏' : 'My Favourites';
  document.getElementById('heroSub').textContent = lang === 'zh' ? '您儲存的音樂家，一覽無遺。' : 'Your saved musicians, all in one place.';
  document.getElementById('heroBreadCurrent').textContent = lang === 'zh' ? '我的收藏' : 'My Favourites';
  document.getElementById('gridSectionTitle').textContent = lang === 'zh' ? '已收藏的音樂家' : 'Saved Musicians';
  renderGrid();
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function renderStars(r) {
  var full = Math.floor(r), half = (r - full) >= 0.5;
  var s = '';
  for (var i = 0; i < full; i++) s += '★';
  if (half) s += '½';
  return s;
}

// ── Render grid ───────────────────────────────────────────────────────────────

  // Filter MUSICIANS to only those in favourites
  var list = MUSICIANS.filter(function(m) { return favourites.indexOf(m.id) !== -1; });

  if (!list.length) {
    grid.innerHTML = '';
    grid.style.display = 'none';
    emptyState.style.display = 'block';
    emptyTitle.textContent = _currentLang === 'zh' ? '尚無收藏' : 'No favourites yet';

    gridCount.textContent = '';

  }

  grid.style.display = '';
  emptyState.style.display = 'none';
  gridCount.textContent = list.length + (_currentLang === 'zh' ? ' 位音樂家' : ' musician' + (list.length !== 1 ? 's' : ''));

  grid.innerHTML = list.map(function(m) {
    var isFav = true; // all cards here are favourites

// ── Favourites ────────────────────────────────────────────────────────────────
function toggleFav(e, id) {
  e.stopPropagation();
  e.preventDefault();
  var idx = favourites.indexOf(id);
  if (idx !== -1) {
    favourites.splice(idx, 1);
  } else {
    favourites.push(id);
  }
  localStorage.setItem('mono-favs', JSON.stringify(favourites));
  updateFavBtn();
  renderGrid();
}

function updateFavBtn() {
  var count = favourites.length;
  var el = document.getElementById('navFavCount');
  if (el) { el.textContent = count; el.style.display = count ? 'flex' : 'none'; }
}

/* ── Nav: scroll hide/show with lerp ── */
(function() {
  var navEl = document.querySelector('nav');
  var navH = navEl ? navEl.offsetHeight : 64;
  var navTarget = 0, navCurrent = 0, lastY = 0, raf = null;
  function tick() {
    navCurrent += (navTarget - navCurrent) * 0.1;
    if (navEl) navEl.style.top = navCurrent + 'px';
    if (Math.abs(navTarget - navCurrent) < 0.05) {
      if (navEl) navEl.style.top = navTarget + 'px';
      navCurrent = navTarget; raf = null;
    } else { raf = requestAnimationFrame(tick); }
  }
  window.addEventListener('scroll', function() {
    var y = window.scrollY;
    navTarget = y < 80 ? 0 : (y > lastY ? -navH : 0);
    lastY = y;
    if (!raf) raf = requestAnimationFrame(tick);
  }, { passive: true });
})();

/* ── Nav: mix-blend-mode difference + underline + char split (auto-colour) ── */
(function() {
  var nav = document.querySelector('nav');
  if (!nav) return;

  function _splitToChars(el) {
    var text = el.textContent;
    el.innerHTML = [...text].map(function(ch) {
      return ch === ' ' ? '<span class="nc-char nc-sp"> </span>' : '<span class="nc-char">' + ch + '</span>';
    }).join('');
  }
  function _resplitNav() {
    nav.querySelectorAll('.nav-links a').forEach(function(a) { _splitToChars(a); });
    var ln = nav.querySelector('.nav-logo-name');
    var ls = nav.querySelector('.nav-logo-sub');
    if (ln) _splitToChars(ln);
    if (ls) _splitToChars(ls);
  }
  _resplitNav();
  window.__navResplit = _resplitNav;

  function updateColors() {
    var megaOpen = nav.classList.contains('mega-open');
    if (megaOpen) {
      nav.querySelectorAll('.nc-char').forEach(function(s) { s.style.color = '#000'; });
      ['.nav-fav-btn','.lang-toggle','.nav-login-btn','.hamburger'].forEach(function(sel) {
        var el = nav.querySelector(sel); if (!el) return;
        el.style.color = '#000'; el.style.borderColor = 'rgba(0,0,0,.35)';
      });
      nav.querySelectorAll('.hamburger span').forEach(function(s) { s.style.background = '#000'; });
      nav.classList.remove('nav-on-dark'); nav.classList.add('nav-on-light');
      return;
    }
    nav.querySelectorAll('.nc-char').forEach(function(s) { s.style.color = '#fff'; });
    ['.nav-fav-btn','.lang-toggle','.nav-login-btn','.hamburger'].forEach(function(sel) {
      var el = nav.querySelector(sel); if (!el) return;
      el.style.color = '#fff'; el.style.borderColor = 'rgba(255,255,255,.5)';
    });
    nav.querySelectorAll('.hamburger span').forEach(function(s) { s.style.background = '#fff'; });
  }

  /* Inject underline span into every nav link */
  nav.querySelectorAll('.nav-links a').forEach(function(a) {
    if (!a.querySelector('.nav-ul')) {
      var ul = document.createElement('span');
      ul.className = 'nav-ul';
      a.appendChild(ul);
    }
  });

  updateColors();
  window.addEventListener('scroll', updateColors, { passive: true });
  window.addEventListener('resize', updateColors);
  setTimeout(updateColors, 300);
})();
</script>

  try {
    const app = initializeApp(firebaseConfig);
    const db  = getFirestore(app);
    const snap = await getDocs(collection(db, 'musicians'));
    if (!snap.empty) {
      const realMusicians = [];
      let colorIdx = 0;
      snap.forEach((d) => {
        const p = d.data();
        if (p.status === 'suspended') return;
        const insts = Array.isArray(p.instruments) ? p.instruments : (p.instrument ? [p.instrument] : []);
        const primaryInst = insts[0] || '—';
        realMusicians.push({
          id:         d.id,
          uid:        d.id,
          name:       p.name || p.email.split('@')[0],
          instrument: primaryInst,
          instruments: insts,
          country:    (p.primaryRegion || '').split(' · ')[0] || 'Taiwan',
          region:     (p.primaryRegion || '').split(' · ').slice(1).join(' · ') || p.primaryRegion || '—',
          style:      'Classical',
          level:      'Professional',
          rating:     0,
          reviews:    0,
          bio:        p.bio || '',
          emoji:      '🎵',
          color:      CARD_COLORS[colorIdx++ % CARD_COLORS.length],
          profileUrl: 'musician-profile.html?uid=' + d.id
        });
      });
      if (realMusicians.length > 0) {
        window.MUSICIANS = realMusicians;
        renderGrid();
      }
    }
  } catch(e) {
    console.log('Firestore load error:', e);
